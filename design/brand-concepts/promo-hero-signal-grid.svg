  <text x="110" y="146" fill="#8EA9BF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24">DEVELOPER-FIRST ORCHESTRATION</text>
  <text x="110" y="280" fill="#F0F7FE" font-family="ui-sans-serif, system-ui, sans-serif" font-size="104" font-weight="700">Keep the agent</text>
