server:
  bind: 127.0.0.1
  port: 8787
  health_path: /health

ingress:
  linear_webhook_path: /webhooks/linear
  max_body_bytes: 262144
  max_timestamp_skew_seconds: 60

logging:
  level: info
  format: logfmt
  file_path: /var/log/patchrelay/patchrelay.log
  webhook_archive_dir: /var/log/patchrelay/webhooks

database:
  path: ${PATCHRELAY_DB_PATH:-/var/lib/patchrelay/patchrelay.sqlite}
  wal: true

linear:
  webhook_secret_env: LINEAR_WEBHOOK_SECRET
  api_token_env: LINEAR_API_TOKEN
  graphql_url: https://api.linear.app/graphql

runner:
  git_bin: git
  codex:
    bin: codex
    args:
      - app-server
    shell_bin: /bin/bash
    source_bashrc: true
    service_name: patchrelay
    approval_policy: never
    sandbox_mode: danger-full-access
    persist_extended_history: false

projects:
  - id: your-project
    repo_path: /srv/repos/your-project
    worktree_root: /srv/patchrelay/worktrees/your-project
    workflow_files:
      development: /srv/repos/your-project/IMPLEMENTATION_WORKFLOW.md
      review: /srv/repos/your-project/REVIEW_WORKFLOW.md
      deploy: /srv/repos/your-project/DEPLOY_WORKFLOW.md
      cleanup: /srv/repos/your-project/CLEANUP_WORKFLOW.md
    workflow_statuses:
      development: Start
      review: Review
      deploy: Deploy
      development_active: Implementing
      review_active: Reviewing
      deploy_active: Deploying
      cleanup: Cleanup
      human_needed: Human Needed
      done: Done
    workflow_labels:
      working: llm-working
      awaiting_handoff: llm-awaiting-handoff
    issue_key_prefixes:
      - APP
    linear_team_ids:
      - APP
    allow_labels: []
    trigger_events:
      - statusChanged
      - commentCreated
      - commentUpdated
      - assignmentChanged
    branch_prefix: app
