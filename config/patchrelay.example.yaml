server:
  bind: 127.0.0.1
  port: 8787
  # Public HTTPS origin that Linear should use for webhook delivery.
  # PatchRelay still typically binds only to 127.0.0.1 and sits behind Caddy/nginx.
  public_base_url: https://patchrelay.example.com
  health_path: /health
  readiness_path: /ready

ingress:
  linear_webhook_path: /webhooks/linear
  max_body_bytes: 262144
  max_timestamp_skew_seconds: 60

logging:
  level: info
  format: logfmt
  file_path: ${PATCHRELAY_LOG_FILE:-/home/your-user/.local/state/patchrelay/patchrelay.log}
  # Optional. Enable only if you want raw webhook archives on disk.
  # webhook_archive_dir: /home/your-user/.local/state/patchrelay/webhooks

database:
  path: ${PATCHRELAY_DB_PATH:-/home/your-user/.local/state/patchrelay/patchrelay.sqlite}
  wal: true

linear:
  # These env vars are machine-level PatchRelay secrets shared across the
  # projects served by this PatchRelay instance.
  webhook_secret_env: LINEAR_WEBHOOK_SECRET
  graphql_url: https://api.linear.app/graphql
  token_encryption_key_env: PATCHRELAY_TOKEN_ENCRYPTION_KEY
  oauth:
    client_id_env: LINEAR_OAUTH_CLIENT_ID
    client_secret_env: LINEAR_OAUTH_CLIENT_SECRET
    scopes:
      - read
      - write
      - app:assignable
      - app:mentionable
    actor: app

operator_api:
  enabled: false
  # Personal-mode default is disabled. If enabled on anything other than
  # 127.0.0.1, require a bearer token env.
  # bearer_token_env: PATCHRELAY_OPERATOR_TOKEN

runner:
  git_bin: git
  codex:
    bin: codex
    args:
      - app-server
    shell_bin: /bin/bash
    source_bashrc: true
    service_name: patchrelay
    approval_policy: never
    sandbox_mode: danger-full-access
    persist_extended_history: false

defaults:
  # Optional global conventions. Workflow file paths are resolved relative to
  # each project's repo_path unless you provide absolute paths.
  workflow_files:
    development: IMPLEMENTATION_WORKFLOW.md
    review: REVIEW_WORKFLOW.md
    deploy: DEPLOY_WORKFLOW.md
    cleanup: CLEANUP_WORKFLOW.md
  workflow_statuses:
    development: Start
    review: Review
    deploy: Deploy
    development_active: Implementing
    review_active: Reviewing
    deploy_active: Deploying
    cleanup: Cleanup
    cleanup_active: Cleaning Up
    human_needed: Human Needed
    done: Done

projects:
  - id: your-project
    repo_path: /home/your-user/src/your-project
    worktree_root: /home/your-user/.local/share/patchrelay/worktrees/your-project
    workflow_labels:
      working: llm-working
      awaiting_handoff: llm-awaiting-handoff
    issue_key_prefixes:
      - APP
    linear_team_ids:
      - APP
    allow_labels: []
    # Optional. If set, PatchRelay ignores webhooks whose Linear actor does not
    # match one of these trusted identities. Use ids/emails for owners, or
    # email_domains for a group-style allowlist.
    trusted_actors:
      ids: []
      names: []
      emails:
        - owner@example.com
      email_domains:
        - trusted.example.com
    # Optional. PatchRelay defaults to agentSessionCreated, agentPrompted, and
    # statusChanged for app-mode installs. Set this only if you want custom
    # steering behavior.
    # trigger_events:
    #   - agentSessionCreated
    #   - agentPrompted
    #   - statusChanged
    branch_prefix: app

  - id: your-project-with-overrides
    repo_path: /home/your-user/src/your-project-with-overrides
    worktree_root: /home/your-user/.local/share/patchrelay/worktrees/your-project-with-overrides
    workflow_files:
      deploy: ops/RELEASE_WORKFLOW.md
    workflow_statuses:
      review: QA Review
      review_active: In QA
      cleanup: null
      cleanup_active: null
    linear_team_ids:
      - OPS
    branch_prefix: ops
