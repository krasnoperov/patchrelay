server:
  bind: 127.0.0.1
  port: 8787
  health_path: /health

ingress:
  linear_webhook_path: /webhooks/linear
  max_body_bytes: 262144
  max_timestamp_skew_seconds: 60

logging:
  level: info
  format: logfmt
  file_path: /var/log/patchrelay/patchrelay.log
  webhook_archive_dir: /var/log/patchrelay/webhooks

database:
  path: ${PATCHRELAY_DB_PATH:-/home/alv/.local/share/patchrelay/patchrelay.sqlite}
  wal: true

linear:
  webhook_secret_env: LINEAR_WEBHOOK_SECRET

runner:
  git_bin: git
  codex:
    bin: codex
    args:
      - app-server
    service_name: patchrelay
    approval_policy: never
    sandbox_mode: danger-full-access
    persist_extended_history: false

projects:
  - id: usertold
    repo_path: /home/alv/projects/usertold
    worktree_root: /home/alv/worktrees/usertold
    workflow_files:
      development: /home/alv/projects/usertold/DEVELOPMENT_WORKFLOW.md
      review: /home/alv/projects/usertold/REVIEW_WORKFLOW.md
      deploy: /home/alv/projects/usertold/DEPLOY_WORKFLOW.md
      cleanup: /home/alv/projects/usertold/CLEANUP_WORKFLOW.md
    workflow_statuses:
      development: Start
      review: Review
      deploy: Deploy
      cleanup: Cleanup
      human_needed: Human Needed
      done: Done
    issue_key_prefixes:
      - USE
    linear_team_ids:
      - USE
    allow_labels: []
    trigger_events:
      - statusChanged
    branch_prefix: use
