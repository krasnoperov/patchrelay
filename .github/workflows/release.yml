name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: CI & Release
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'ci: release') }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck && npm run -w packages/merge-steward typecheck && npm run -w packages/review-quill typecheck

      - name: Test
        run: npm test && npm run -w packages/merge-steward test && npm run -w packages/review-quill test

      - name: Compute release plan
        id: plan
        run: node .github/scripts/release-plan.mjs

      - name: Build patchrelay
        if: steps.plan.outputs.root_publish == 'true'
        run: npm run build

      - name: Build merge-steward
        if: steps.plan.outputs.steward_publish == 'true'
        run: npm run -w packages/merge-steward build

      - name: Build review-quill
        if: steps.plan.outputs.review_quill_publish == 'true'
        run: npm run -w packages/review-quill build

      - name: Create release app token
        if: steps.plan.outputs.any_release == 'true'
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Commit release marker
        if: steps.plan.outputs.any_release == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json packages/merge-steward/package.json packages/review-quill/package.json
          git commit --allow-empty -m "ci: release"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin main

      - name: Publish patchrelay
        if: steps.plan.outputs.root_publish == 'true'
        run: npm publish --access public

      - name: Publish merge-steward
        if: steps.plan.outputs.steward_publish == 'true'
        run: npm publish -w packages/merge-steward --access public

      - name: Publish review-quill
        if: steps.plan.outputs.review_quill_publish == 'true'
        run: npm publish -w packages/review-quill --access public

      - name: Push release tags
        if: steps.plan.outputs.any_release == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [[ "${{ steps.plan.outputs.root_release }}" == "true" ]]; then
            git tag "patchrelay-v${{ steps.plan.outputs.root_version }}" || true
          fi
          if [[ "${{ steps.plan.outputs.steward_release }}" == "true" ]]; then
            git tag "merge-steward-v${{ steps.plan.outputs.steward_version }}" || true
          fi
          if [[ "${{ steps.plan.outputs.review_quill_release }}" == "true" ]]; then
            git tag "review-quill-v${{ steps.plan.outputs.review_quill_version }}" || true
          fi
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git push --tags origin main
