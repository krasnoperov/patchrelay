name: Release

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Create or publish release
    runs-on: ubuntu-latest
    steps:
      - name: Create release app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4.4.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Set up Node.js
        if: ${{ steps.release.outputs.releases_created }}
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        if: ${{ steps.release.outputs.releases_created }}
        run: npm ci

      - name: Verify patchrelay
        if: ${{ steps.release.outputs['.--release_created'] }}
        run: npm run ci

      - name: Publish patchrelay
        if: ${{ steps.release.outputs['.--release_created'] }}
        run: npm publish --access public

      - name: Verify merge-steward
        if: ${{ steps.release.outputs['packages/merge-steward--release_created'] }}
        run: npm run -w packages/merge-steward test && npm run -w packages/merge-steward build

      - name: Publish merge-steward
        if: ${{ steps.release.outputs['packages/merge-steward--release_created'] }}
        run: npm publish -w packages/merge-steward --access public
