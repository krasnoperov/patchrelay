name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Typecheck merge-steward
        run: pnpm --filter merge-steward typecheck

      - name: Typecheck review-quill
        run: pnpm --filter review-quill typecheck

      - name: Test
        run: pnpm test

      - name: Test merge-steward
        run: pnpm --filter merge-steward test

      - name: Test review-quill
        run: pnpm --filter review-quill test

      - name: Build
        run: pnpm build

      - name: Build merge-steward
        run: pnpm --filter merge-steward build

      - name: Build review-quill
        run: pnpm --filter review-quill build
