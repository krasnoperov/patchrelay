name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Typecheck merge-steward
        run: npm run -w packages/merge-steward typecheck

      - name: Typecheck review-quill
        run: npm run -w packages/review-quill typecheck

      - name: Test
        run: npm test

      - name: Test merge-steward
        run: npm run -w packages/merge-steward test

      - name: Test review-quill
        run: npm run -w packages/review-quill test

      - name: Build
        run: npm run build

      - name: Build merge-steward
        run: npm run -w packages/merge-steward build

      - name: Build review-quill
        run: npm run -w packages/review-quill build
