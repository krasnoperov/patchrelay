name: Auto-merge Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - 'release-please--**'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-pr-merge-${{ github.event.workflow_run.head_branch || github.run_id }}
  cancel-in-progress: false

jobs:
  merge-release-pr:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Create release app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Merge ready release PR
        env:
          EVENT_NAME: ${{ github.event.workflow_run.event }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail

          node <<'NODE'
          const { execFileSync } = require('node:child_process');

          const repo = process.env.REPO;
          const eventName = process.env.EVENT_NAME;
          const headBranch = process.env.HEAD_BRANCH;
          const headSha = process.env.HEAD_SHA;

          if (!repo || !eventName || !headBranch || !headSha) {
            console.log('Skipping because workflow_run context is incomplete');
            process.exit(0);
          }

          if (!['push', 'pull_request'].includes(eventName)) {
            console.log(`Skipping release branch CI from unsupported event ${eventName}`);
            process.exit(0);
          }

          const allowedReleaseFiles = new Set([
            'CHANGELOG.md',
            'package.json',
            'package-lock.json',
            '.release-please-manifest.json',
            'packages/merge-steward/CHANGELOG.md',
            'packages/merge-steward/package.json',
          ]);

          function ghJson(args) {
            return JSON.parse(execFileSync('gh', args, { encoding: 'utf8' }));
          }

          function sleep(ms) {
            return new Promise((resolve) => setTimeout(resolve, ms));
          }

          async function waitForReadyReleasePr() {
            for (let attempt = 0; attempt < 12; attempt += 1) {
              const prs = ghJson([
                'pr',
                'list',
                '--repo',
                repo,
                '--state',
                'all',
                '--base',
                'main',
                '--json',
                'number,title,state,isDraft,labels,headRefName,headRefOid,mergeStateStatus',
              ]);

              const pr = prs.find((candidate) => candidate.headRefName === headBranch);
              if (!pr) {
                await sleep(10000);
                continue;
              }

              if (pr.state !== 'OPEN') {
                console.log(`Skipping ${pr.state.toLowerCase()} release PR #${pr.number} for ${headBranch}`);
                process.exit(0);
              }

              if (pr.headRefOid !== headSha) {
                console.log(
                  `Skipping stale CI result for ${headBranch}: workflow SHA ${headSha}, PR head ${pr.headRefOid}`,
                );
                process.exit(0);
              }

              if (!/^chore(\([^)]+\))?!?: release /.test(pr.title ?? '')) {
                throw new Error(`Release PR #${pr.number} has an unexpected title: ${pr.title}`);
              }

              if (pr.isDraft) {
                console.log(`Skipping draft release PR #${pr.number}`);
                process.exit(0);
              }

              const labels = (pr.labels ?? []).map((label) => label.name);
              if (labels.includes('hold-release')) {
                console.log(`Skipping held release PR #${pr.number}`);
                process.exit(0);
              }

              const files = ghJson([
                'api',
                `repos/${repo}/pulls/${pr.number}/files?per_page=100`,
              ]);
              const unexpectedFiles = files
                .map((file) => file.filename)
                .filter((file) => !allowedReleaseFiles.has(file));

              if (unexpectedFiles.length > 0) {
                throw new Error(`Release PR #${pr.number} includes unexpected files: ${unexpectedFiles.join(', ')}`);
              }

              const mergeState = pr.mergeStateStatus ?? '';
              if (['CLEAN', 'UNSTABLE', 'HAS_HOOKS'].includes(mergeState)) {
                return pr;
              }

              console.log(`Waiting for release PR #${pr.number} to become mergeable (mergeState=${mergeState})`);
              await sleep(10000);
            }

            throw new Error(`Timed out waiting for release PR on ${headBranch} to become mergeable`);
          }

          async function main() {
            const pr = await waitForReadyReleasePr();
            execFileSync(
              'gh',
              ['pr', 'merge', String(pr.number), '--repo', repo, '--squash', '--delete-branch'],
              { stdio: 'inherit' },
            );
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE
